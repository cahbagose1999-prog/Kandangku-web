<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>KandangKu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f3f4f6;
      padding: 15px;
    }

    h2 {
      text-align: center;
      color: green;
    }

    .box {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: green;
      color: white;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h2>🐔 KandangKu</h2>

<div class="box">
  <h3>Input Harian</h3>

  <input id="mortalitas" type="number" placeholder="Mortalitas">
  <input id="pakan" type="number" placeholder="Pakan (kg)">
  <input id="produksi" type="number" placeholder="Produksi">

  <button onclick="simpan()">Simpan Data</button>
</div>

<div class="box">
  <h3>Riwayat</h3>
  <div id="data"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("kandangku") || "[]");

function simpan() {
  let m = document.getElementById("mortalitas").value;
  let p = document.getElementById("pakan").value;
  let pr = document.getElementById("produksi").value;

  data.push({mortalitas: m, pakan: p, produksi: pr});
  localStorage.setItem("kandangku", JSON.stringify(data));

  render();
}

function render() {
  let html = "";

  data.forEach((d, i) => {
    html += `
      <div class="box">
        <b>Data ${i+1}</b><br>
        Mortalitas: ${d.mortalitas}<br>
        Pakan: ${d.pakan}<br>
        Produksi: ${d.produksi}
      </div>
    `;
  });

  document.getElementById("data").innerHTML = html;
}

render();
</script>

</body>
</html>
